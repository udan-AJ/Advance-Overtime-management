<!DOCTYPE html>    
<html lang="si">    
<head>    
    <meta charset="UTF-8">    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <title>Advanced OT Tracker | CIC Livestock Solutions</title>    
    <script src="https://cdn.tailwindcss.com"></script>    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>    
        
    <script type="module">    
        import { db, auth } from './firebase-config.js';
        import { initAuth, login, signup, logout } from './auth.js';
        import { calculateRow, cleanTime } from './calculator.js';
        import { doc, setDoc, getDoc, collection, query, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let userHolidays = [];
        let userLeaves = {};

        initAuth(
            async (user) => {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('appScreen').classList.remove('hidden');
                await loadInitialData();
            },
            () => {
                document.getElementById('authScreen').classList.remove('hidden');
                document.getElementById('appScreen').classList.add('hidden');
            }
        );

        async function loadInitialData() {
            await loadHolidays();
            await loadLeaves();
            renderSheet();
        }

        async function loadHolidays() {    
            const q = query(collection(db, "users", auth.currentUser.uid, "holidays"));    
            const querySnapshot = await getDocs(q);    
            userHolidays = querySnapshot.docs.map(doc => doc.id);    
            renderHolidayList();
        }

        async function loadLeaves() {
            const user = auth.currentUser;
            const monthId = `${document.getElementById('yearSelect').value}-${parseInt(document.getElementById('monthSelect').value) + 1}`;
            const docSnap = await getDoc(doc(db, "users", user.uid, "leaves", monthId));
            userLeaves = docSnap.exists() ? docSnap.data() : {};
            renderLeaveList();
        }

        async function renderSheet() {    
            const user = auth.currentUser;    
            const month = parseInt(document.getElementById('monthSelect').value);    
            const year = parseInt(document.getElementById('yearSelect').value);    
            const container = document.getElementById('sheetContainer');    
            const daysInMonth = new Date(year, month + 1, 0).getDate();    
            const monthId = `${year}-${month + 1}`;    
            
            container.innerHTML = "<div class='p-10 text-center text-slate-400 text-xs font-bold uppercase'>Syncing Data...</div>";    
            const docSnap = await getDoc(doc(db, "users", user.uid, "months", monthId));    
            const savedData = docSnap.exists() ? docSnap.data() : {};    

            container.innerHTML = "";    
            let tOT = 0, tSOT = 0, tLieu = 0, tShort = 0;
            let lastDayWasFullShift = false;
    
            for (let d = 1; d <= daysInMonth; d++) {    
                const dateObj = new Date(year, month, d);
                const isHoliday = userHolidays.includes(dateObj.toLocaleDateString('en-CA'));    
                const dayData = savedData[String(d)] || { in: "00:00", out: "00:00", isNextDay: false };    
                const leaveData = userLeaves[d];

                const res = calculateRow(dayData.in, dayData.out, isHoliday, dateObj.getDay(), dayData.isNextDay, lastDayWasFullShift, leaveData, (d === daysInMonth));
                lastDayWasFullShift = res.isFullDay;
                tOT += res.ot; tSOT += res.sOT; if(res.lieu) tLieu++; if(res.isShort) tShort++;
    
                const row = document.createElement('div');    
                row.className = `flex items-center gap-1 p-3 border-b ${isHoliday ? 'bg-red-50' : (dateObj.getDay() === 0 ? 'bg-orange-50' : 'bg-white')}`;    
                row.innerHTML = `    
                    <div class="w-8 text-center">    
                        <span class="block text-[7px] font-bold text-slate-400 uppercase">${dateObj.toLocaleDateString('en-US', { weekday: 'short' })}</span>    
                        <span class="text-base font-black text-slate-700 leading-none">${d}</span>    
                    </div>    
                    <div class="flex-1 grid grid-cols-2 gap-1 opacity-80">    
                        <input type="time" value="${dayData.in}" class="p-1 rounded-lg border text-[10px] bg-slate-50" readonly>
                        <input type="time" value="${dayData.out}" class="p-1 rounded-lg border text-[10px] bg-slate-50" readonly>
                    </div>
                    <div class="w-20 text-center text-[8px] font-bold border-x px-1 leading-tight">
                        <p class="text-blue-600 truncate uppercase">${leaveData ? leaveData.type : '-'}</p>
                        <div class="flex justify-between mt-1"><span class="text-slate-400">W:${res.worked}</span><span class="text-red-500">R:${res.req}</span></div>
                    </div>    
                    <div class="w-12 text-right">    
                        <div class="text-[8px] font-black text-blue-600">${res.ot}</div>
                        <div class="text-[8px] font-black text-red-600">${res.sOT}</div>
                    </div>    
                `;    
                container.appendChild(row);    
            }    
            document.getElementById('totalHrs').innerHTML = `OT: ${tOT.toFixed(1)} | SOT: ${tSOT.toFixed(1)} | Lieu: ${tLieu} | Short: ${tShort}/2`;    
        }

        window.handleLogin = () => login(document.getElementById('email').value, document.getElementById('pass').value).catch(e => alert(e.message));
        window.handleSignup = () => signup(document.getElementById('email').value, document.getElementById('pass').value).then(() => alert("Account Created!")).catch(e => alert(e.message));
        window.logout = logout;
        window.renderSheet = renderSheet;

        window.importExcel = () => {
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = '.xlsx, .xls';
            fileInput.onchange = async (e) => {
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const workbook = XLSX.read(new Uint8Array(event.target.result), { type: 'array', cellDates: true });
                    const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { range: 11, defval: "", raw: false });
                    const monthId = `${document.getElementById('yearSelect').value}-${parseInt(document.getElementById('monthSelect').value) + 1}`;
                    let currentData = {};
                    jsonData.forEach(row => {
                        let dK = Object.keys(row).find(k => k.trim().toLowerCase() === "date");
                        let iK = Object.keys(row).find(k => k.trim().toLowerCase() === "check in");
                        let oK = Object.keys(row).find(k => k.trim().toLowerCase() === "check out");
                        let odK = Object.keys(row).find(k => k.trim().toLowerCase() === "out date");

                        if(row[dK]) {
                            let ds = String(row[dK]).trim(), p = ds.split(/[-/ ]/), day = p.length >= 3 ? (p[0].length === 4 ? parseInt(p[2]) : parseInt(p[0])) : parseInt(ds);
                            if(day) currentData[String(day)] = { in: cleanTime(row[iK]), out: cleanTime(row[oK]), isNextDay: (row[odK] && String(row[odK]).trim() !== ds) };
                        }
                    });
                    await setDoc(doc(db, "users", auth.currentUser.uid, "months", monthId), currentData, { merge: true });
                    alert("Import Success!"); renderSheet();
                };
                reader.readAsArrayBuffer(e.target.files[0]);
            };
            fileInput.click();
        };

        window.switchTab = (tab) => {
            ['sheetView', 'holidayView', 'leaveView'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(tab + 'View').classList.remove('hidden');
        };

        window.addHoliday = async () => {    
            const date = document.getElementById('holidayInput').value;    
            if (!date) return;    
            await setDoc(doc(db, "users", auth.currentUser.uid, "holidays", date), { active: true });    
            await loadHolidays(); renderSheet();    
        };    
    
        window.removeHoliday = async (date) => {    
            await deleteDoc(doc(db, "users", auth.currentUser.uid, "holidays", date));    
            await loadHolidays(); renderSheet();    
        };

        function renderHolidayList() {    
            document.getElementById('holidayList').innerHTML = userHolidays.map(date => `<div class="flex justify-between items-center p-3 bg-white rounded-xl mb-2 border border-slate-100 shadow-sm"><span class="font-bold text-slate-700 text-xs">${date}</span><button onclick="removeHoliday('${date}')" class="text-red-500 text-[10px] font-black uppercase">Remove</button></div>`).join('') || `<p class="text-slate-400 text-[10px] text-center py-4">No Holidays Added</p>`;    
        }

        window.saveLeave = async () => {
            const dt = document.getElementById('leaveDate').value; const ty = document.getElementById('leaveType').value; const sl = document.getElementById('leaveSlot').value;
            if(!dt) return alert("Select Date"); const dObj = new Date(dt); const day = dObj.getDate(); const mId = `${dObj.getFullYear()}-${dObj.getMonth() + 1}`;
            userLeaves[day] = { type: ty, slot: sl }; await setDoc(doc(db, "users", auth.currentUser.uid, "leaves", mId), userLeaves, { merge: true });
            alert("Leave Saved!"); await loadLeaves(); renderSheet();
        };

        window.deleteLeave = async (day) => {
            delete userLeaves[day]; const mId = `${document.getElementById('yearSelect').value}-${parseInt(document.getElementById('monthSelect').value) + 1}`;
            await setDoc(doc(db, "users", auth.currentUser.uid, "leaves", mId), userLeaves); await loadLeaves(); renderSheet();
        };

        function renderLeaveList() {
            document.getElementById('leaveList').innerHTML = Object.entries(userLeaves).map(([day, data]) => `<div class="flex justify-between items-center p-3 bg-white rounded-xl mb-2 border border-slate-100"><div class="text-[10px] font-bold text-slate-600">Day ${day} - ${data.type}</div><button onclick="deleteLeave('${day}')" class="text-red-500 text-[10px] font-black uppercase">Delete</button></div>`).join('') || `<p class="text-slate-400 text-[10px] text-center py-4">No leaves recorded.</p>`;
        }

        window.clearMonthData = async () => {
            if(!confirm("Are you sure?")) return;
            const monthId = `${document.getElementById('yearSelect').value}-${parseInt(document.getElementById('monthSelect').value) + 1}`;
            await deleteDoc(doc(db, "users", auth.currentUser.uid, "months", monthId)); renderSheet();
        };

    </script>    
</head>    
<body class="bg-slate-50 min-h-screen text-slate-900 pb-12">    
    <div id="authScreen" class="max-w-md mx-auto pt-24 px-6 text-center">    
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl border">    
            <h1 class="text-2xl font-black mb-8 text-blue-600">Cloud Sync</h1>    
            <input type="email" id="email" placeholder="Email" class="w-full p-4 mb-3 bg-slate-50 rounded-2xl border outline-none text-sm">    
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 mb-8 bg-slate-50 rounded-2xl border outline-none text-sm">    
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl mb-4">LOGIN</button>
            <button onclick="handleSignup()" class="w-full bg-slate-100 text-slate-600 font-bold py-4 rounded-2xl text-[10px] uppercase border tracking-widest">Create Account</button>
        </div>    
    </div>    
    
    <div id="appScreen" class="hidden max-w-lg mx-auto">    
        <div class="bg-white flex text-center border-b sticky top-0 z-20 shadow-sm">    
            <button onclick="switchTab('sheet')" class="flex-1 py-4 font-black text-[10px] uppercase text-slate-500">Sheet</button>    
            <button onclick="switchTab('leave')" class="flex-1 py-4 font-black text-[10px] uppercase text-slate-500">Leaves</button>    
            <button onclick="switchTab('holiday')" class="flex-1 py-4 font-black text-[10px] uppercase text-slate-500">Holidays</button>    
        </div>    
    
        <div id="sheetView" class="p-4">    
            <div class="bg-blue-600 p-6 rounded-[2.5rem] text-white shadow-xl mb-4">    
                <div class="flex justify-between items-center mb-4">    
                    <div id="totalHrs" class="text-[10px] font-black uppercase">Syncing...</div>    
                    <button onclick="logout()" class="text-[8px] font-black bg-white/20 px-2 py-1 rounded">LOGOUT</button>
                </div>
                <div class="flex gap-2 mb-4">    
                    <select id="yearSelect" onchange="renderSheet(); loadLeaves();" class="bg-white/20 p-2 rounded-xl text-[10px] flex-1 outline-none border-none"><option>2026</option></select>    
                    <select id="monthSelect" onchange="renderSheet(); loadLeaves();" class="bg-white/20 p-2 rounded-xl text-[10px] flex-1 outline-none border-none">
                        <option value="0">JANUARY</option><option value="1">FEBRUARY</option><option value="2">MARCH</option>
                        <option value="3" selected>APRIL</option><option value="4">MAY</option><option value="5">JUNE</option>
                        <option value="6">JULY</option><option value="7">AUGUST</option><option value="8">SEPTEMBER</option>
                        <option value="9">OCTOBER</option><option value="10">NOVEMBER</option><option value="11">DECEMBER</option>
                    </select>    
                </div>    
                <div class="flex gap-2">
                    <button onclick="importExcel()" class="flex-1 bg-white text-blue-600 text-[10px] py-3 rounded-xl font-black uppercase">Import</button>
                    <button onclick="clearMonthData()" class="flex-1 bg-red-500 text-white text-[10px] py-3 rounded-xl font-black uppercase">Clear</button>
                </div>
            </div>    
            <div id="sheetContainer" class="bg-white rounded-[2rem] border overflow-hidden shadow-sm"></div>    
        </div>

        <div id="leaveView" class="hidden p-6">
            <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm mb-6">
                <h3 class="font-black text-xs uppercase mb-4 text-slate-400">Record Leave</h3>
                <input type="date" id="leaveDate" class="w-full p-3 bg-slate-50 border rounded-xl mb-3 text-sm outline-none">
                <select id="leaveType" class="w-full p-3 bg-slate-50 border rounded-xl mb-3 text-sm outline-none"><option>Full Leave</option><option>Half Day</option><option>Short Leave</option><option>Lieu Leave</option></select>
                <select id="leaveSlot" class="w-full p-3 bg-slate-50 border rounded-xl mb-4 text-sm outline-none"><option>Full Day</option><option>Morning</option><option>Evening</option></select>
                <button onclick="saveLeave()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg">SAVE LEAVE</button>
            </div>
            <div id="leaveList"></div>
        </div>
    
        <div id="holidayView" class="hidden p-6">    
            <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm mb-6">
                <h3 class="font-black text-xs uppercase mb-4 text-slate-400">Add Holiday</h3>
                <input type="date" id="holidayInput" class="w-full p-4 bg-slate-50 border rounded-xl mb-4 outline-none">    
                <button onclick="addHoliday()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg">ADD TO LIST</button>
            </div>
            <div id="holidayList"></div>
        </div>    
    </div>    
</body>    
</html>
