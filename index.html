<!DOCTYPE html>    
<html lang="si">    
<head>    
    <meta charset="UTF-8">    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <title>Advanced OT Tracker | CIC Livestock Solutions</title>    
    <script src="https://cdn.tailwindcss.com"></script>    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
        
    <script type="module">    
        import { db, auth } from './firebase-config.js';
        import { initAuth, login, signup, logout } from './auth.js';
        import { calculateRow, cleanTime } from './calculator.js';
        import { generatePDF } from './report.js'; 
        import { doc, setDoc, getDoc, collection, query, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let userHolidays = [], userLeaves = {}, currentCalcData = {}, currentMonthRows = [];

        initAuth(async (user) => {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('appScreen').classList.remove('hidden');
            document.getElementById('userName').innerText = user.displayName || user.email.split('@')[0].toUpperCase();
            await loadInitialData();
        }, () => {
            document.getElementById('authScreen').classList.remove('hidden');
            document.getElementById('appScreen').classList.add('hidden');
        });

        async function loadInitialData() {
            await loadHolidays();
            await loadLeaves();
            renderSheet();
        }

        async function loadHolidays() {    
            const q = query(collection(db, "users", auth.currentUser.uid, "holidays"));    
            const snap = await getDocs(q);    
            userHolidays = snap.docs.map(doc => doc.id);
        }

        async function loadLeaves() {
            const mId = `${document.getElementById('yearSelect').value}-${parseInt(document.getElementById('monthSelect').value) + 1}`;
            const docSnap = await getDoc(doc(db, "users", auth.currentUser.uid, "leaves", mId));
            userLeaves = docSnap.exists() ? docSnap.data() : {};
        }

        window.updateCell = async (day, field, value) => {
            const year = document.getElementById('yearSelect').value;
            const month = parseInt(document.getElementById('monthSelect').value) + 1;
            const docRef = doc(db, "users", auth.currentUser.uid, "months", `${year}-${month}`);
            const docSnap = await getDoc(docRef);
            let data = docSnap.exists() ? docSnap.data() : {};
            if(!data[day]) data[day] = { in: "00:00", out: "00:00", isNextDay: false };

            if (field === 'out_full') {
                const [fDate, fTime] = value.split('T');
                data[day].out = fTime;
                data[day].isNextDay = (fDate > `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`);
            } else {
                data[day][field] = value;
            }
            await setDoc(docRef, data, { merge: true });
            renderSheet();
        };

        async function renderSheet() {    
            const month = parseInt(document.getElementById('monthSelect').value);    
            const year = parseInt(document.getElementById('yearSelect').value);    
            const container = document.getElementById('sheetContainer');    
            const daysInMonth = new Date(year, month + 1, 0).getDate();    
            const docSnap = await getDoc(doc(db, "users", auth.currentUser.uid, "months", `${year}-${month + 1}`));    
            const savedData = docSnap.exists() ? docSnap.data() : {};    

            container.innerHTML = ""; currentMonthRows = [];
            let tN = 0, tS = 0, tL = 0, dD = 0, lastS = false, wC = 0, hC = 0, fL = 0, hL = 0;
    
            for (let d = 1; d <= daysInMonth; d++) {    
                const dateObj = new Date(year, month, d);
                const dayW = dateObj.getDay();
                const isoD = dateObj.toLocaleDateString('en-CA');
                const isH = userHolidays.includes(isoD);    
                const dData = savedData[String(d)] || { in: "00:00", out: "00:00", isNextDay: false };    
                const lData = userLeaves[d];

                const res = calculateRow(dData.in, dData.out, isH, dayW, dData.isNextDay, lastS, lData, (d === daysInMonth));
                if ((dayW === 0 || isH) && res.worked >= 9) tL++;
                lastS = res.isFullDay;
                if (dayW === 0 || isH) tS += res.worked; else tN += res.worked;

                if (dayW === 0 || dayW === 6 || isH) { dD++; if(dayW === 0 || dayW === 6) wC++; else hC++; }
                else if (lData) { if (lData.type === "Full Leave" || lData.type === "Lieu Leave") { dD++; fL++; } else if (lData.type === "Half Day") { dD += 0.5; hL++; } }

                if (res.worked > 0 || lData) currentMonthRows.push({ date: isoD, in: dData.in, out: dData.out, worked: res.worked, ot: res.ot, sOT: res.sOT, type: lData ? lData.type : '' });
    
                const curDate = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const outDate = dData.isNextDay ? new Date(year, month, d+1).toLocaleDateString('en-CA') : curDate;

                const row = document.createElement('div');    
                row.className = `flex items-center gap-0.5 p-2 border-b ${isH ? 'bg-red-50' : (dayW === 0 ? 'bg-orange-50' : 'bg-white')}`;    
                row.innerHTML = `    
                    <div class="w-7 text-center shrink-0"><span class="block text-[6px] font-bold text-slate-400 uppercase">${dateObj.toLocaleDateString('en-US',{weekday:'short'})}</span><span class="text-sm font-black">${d}</span></div>    
                    <div class="flex-1 grid grid-cols-2 gap-1">    
                        <input type="time" value="${dData.in}" onchange="updateCell('${d}','in',this.value)" class="p-0.5 rounded border text-[9px] text-center">
                        <input type="datetime-local" value="${outDate}T${dData.out}" onchange="updateCell('${d}','out_full',this.value)" class="p-0.5 rounded border text-[8px] text-center ${dData.isNextDay?'border-red-400':''}">
                    </div>
                    <div class="w-10 text-right shrink-0"><div class="text-[8px] font-black text-blue-600">${res.ot>0?res.ot:''}</div><div class="text-[8px] font-black text-red-600">${res.sOT>0?res.sOT:''}</div></div>`;    
                container.appendChild(row);    
            }    
            const tSW = (daysInMonth - dD) * 9;
            currentCalcData = { year, monthName: document.getElementById('monthSelect').options[month].text, workingDays: (daysInMonth-dD), fullLeaveCount: fL, halfDayCount: hL, tShouldWork: tSW, tNormalOT: Math.max(0, tN-tSW), tSpecialOT: tS, tLieuDays: tL };
            document.getElementById('totalHrs').innerHTML = `Normal Worked: ${tN.toFixed(1)} | Should Work: ${tSW} <br> <button onclick="askUserDetails()" class="w-full bg-green-500 mt-2 py-2 rounded-xl text-[8px] font-black uppercase">Get Report</button>`;
        }

        window.askUserDetails = () => {
            const modal = `<div id="userModal" class="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-6"><div class="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl">
                <input type="text" id="pdfName" placeholder="Full Name" class="w-full p-4 border rounded-2xl mb-3 text-sm font-bold uppercase">
                <input type="text" id="pdfEpf" placeholder="EPF Number" class="w-full p-4 border rounded-2xl mb-6 text-sm font-bold uppercase">
                <button onclick="processPDF()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase text-xs">Generate PDF</button>
            </div></div>`;
            document.body.insertAdjacentHTML('beforeend', modal);
        };

        window.processPDF = () => {
            const n = document.getElementById('pdfName').value; const e = document.getElementById('pdfEpf').value;
            document.getElementById('userModal').remove(); generatePDF(currentCalcData, currentMonthRows, n, e);
        };
        window.loadInitialData = loadInitialData; window.handleLogin = () => login(document.getElementById('email').value, document.getElementById('pass').value);
        window.logout = logout; window.switchTab = (tab) => { /* Switch logic here */ loadInitialData(); };
    </script>    
</head>    
<body class="bg-slate-50 min-h-screen">    
    <div id="authScreen" class="max-w-md mx-auto pt-24 px-6 text-center">    
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl border">    
            <input type="email" id="email" placeholder="Email" class="w-full p-4 mb-3 border rounded-2xl">    
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 mb-8 border rounded-2xl">    
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl uppercase">Login</button>
        </div>    
    </div>    
    <div id="appScreen" class="hidden max-w-lg mx-auto">
        <div class="p-3 flex justify-between items-center bg-white border-b sticky top-0 z-30">
            <span id="userName" class="text-[9px] font-black uppercase">User</span>
            <button onclick="logout()" class="text-red-500 text-[9px] font-black uppercase">Logout</button>
        </div>
        <div class="p-3">
            <div class="bg-blue-600 p-5 rounded-[2rem] text-white mb-4">
                <div id="totalHrs" class="mb-3 font-black text-[10px]">Syncing...</div>
                <div class="flex gap-2">
                    <select id="yearSelect" onchange="loadInitialData()" class="bg-slate-700 p-2 rounded-xl text-[9px] flex-1 text-white font-bold"><option>2026</option></select>
                    <select id="monthSelect" onchange="loadInitialData()" class="bg-slate-700 p-2 rounded-xl text-[9px] flex-1 text-white font-bold">
                        <option value="3" selected>APRIL</option><option value="4">MAY</option>
                    </select>
                </div>
            </div>
            <div id="sheetContainer" class="bg-white rounded-[1.5rem] border overflow-hidden"></div>
        </div>
    </div>
</body>
</html>
