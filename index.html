<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced OT Tracker | CIC Livestock Solutions</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

        import {
            getAuth,
            onAuthStateChanged,
            signOut,
            signInWithEmailAndPassword,
            createUserWithEmailAndPassword
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        import {
            getFirestore,
            doc,
            setDoc,
            getDoc,
            collection,
            query,
            getDocs,
            deleteDoc
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBT3joJWX-dsz4C9-wKsffepSpXypn1n9E",
            authDomain: "time-management-28962.firebaseapp.com",
            projectId: "time-management-28962",
            storageBucket: "time-management-28962.firebasestorage.app",
            messagingSenderId: "813174935711",
            appId: "1:813174935711:web:066f4442e08e600cf512aa"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userHolidays = [];
        let userLeaves = {};
        let currentCalcData = {};
        let isSignUpMode = false;

        onAuthStateChanged(auth, async (user) => {

            if (user) {

                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('appScreen').classList.remove('hidden');

                await loadHolidays();
                await loadLeaves();

                renderSheet();

            } else {

                document.getElementById('authScreen').classList.remove('hidden');
                document.getElementById('appScreen').classList.add('hidden');
            }
        });

        async function loadLeaves() {

            const user = auth.currentUser;

            if (!user) return;

            const monthId =
                `${document.getElementById('yearSelect').value}-${parseInt(document.getElementById('monthSelect').value)+1}`;

            const docSnap =
                await getDoc(doc(db, "users", user.uid, "leaves", monthId));

            userLeaves = docSnap.exists() ? docSnap.data() : {};

            renderLeaveList();
        }

        async function loadHolidays() {

            const user = auth.currentUser;

            if (!user) return;

            const q = query(collection(db, "users", user.uid, "holidays"));

            const querySnapshot = await getDocs(q);

            userHolidays = [];

            querySnapshot.forEach((doc) => userHolidays.push(doc.id));

            renderHolidayList();
        }

        window.addHoliday = async () => {

            const date = document.getElementById('holidayInput').value;

            if (!date) return;

            await setDoc(
                doc(db, "users", auth.currentUser.uid, "holidays", date),
                { active: true }
            );

            await loadHolidays();

            renderSheet();
        };

        window.removeHoliday = async (date) => {

            await deleteDoc(
                doc(db, "users", auth.currentUser.uid, "holidays", date)
            );

            await loadHolidays();

            renderSheet();
        };

        function renderHolidayList() {

            const list = document.getElementById('holidayList');

            if (!list) return;

            list.innerHTML = userHolidays.map(date => `
                <div class="flex justify-between items-center p-3 bg-white rounded-xl mb-2 border border-slate-100 shadow-sm">
                    <span class="font-bold text-slate-700 text-xs">${date}</span>
                    <button onclick="removeHoliday('${date}')" class="text-red-500 text-[10px] font-black uppercase">
                        Remove
                    </button>
                </div>
            `).join('');
        }

        function cleanTime(val) {

            if (!val) return "00:00";

            // FIXED EXCEL TIME IMPORT
            if (typeof val === "number") {

                const totalMinutes = Math.round(val * 24 * 60);

                const hours =
                    Math.floor(totalMinutes / 60) % 24;

                const minutes =
                    totalMinutes % 60;

                return `${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}`;
            }

            let str = String(val).trim();

            let m = str.match(/(\d{1,2}):(\d{1,2})/);

            if (m) {

                return `${m[1].padStart(2,'0')}:${m[2].padStart(2,'0')}`;
            }

            return "00:00";
        }

        // FIXED IMPORT FUNCTION
        window.importExcel = () => {

            const fileInput = document.createElement('input');

            fileInput.type = 'file';

            fileInput.onchange = async (e) => {

                const reader = new FileReader();

                reader.onload = async (event) => {

                    const workbook = XLSX.read(
                        new Uint8Array(event.target.result),
                        { type: 'array' }
                    );

                    const jsonData = XLSX.utils.sheet_to_json(
                        workbook.Sheets[workbook.SheetNames[0]],
                        {
                            range: 11,
                            defval: ""
                        }
                    );

                    const monthId =
                        `${document.getElementById('yearSelect').value}-${parseInt(document.getElementById('monthSelect').value)+1}`;

                    let currentData = {};

                    jsonData.forEach(row => {

                        let dK = Object.keys(row).find(k => k.trim() === "Date");

                        let iK = Object.keys(row).find(k => k.trim() === "Check In");

                        let oK = Object.keys(row).find(k => k.trim() === "Check Out");

                        let odK = Object.keys(row).find(k => k.trim() === "Out Date");

                        if (!dK || !row[dK]) return;

                        let rawDate = row[dK];

                        let day = null;

                        // FIXED EXCEL DATE FORMAT
                        if (typeof rawDate === "number") {

                            const excelDate =
                                XLSX.SSF.parse_date_code(rawDate);

                            if (excelDate) {
                                day = excelDate.d;
                            }

                        } else {

                            const dateObj = new Date(rawDate);

                            if (!isNaN(dateObj)) {
                                day = dateObj.getDate();
                            }
                        }

                        if (!day) return;

                        currentData[String(day)] = {

                            in: cleanTime(row[iK]),

                            out: cleanTime(row[oK]),

                            isNextDay: row[odK]
                                ? new Date(row[odK]).getDate() !== day
                                : false
                        };
                    });

                    await setDoc(
                        doc(
                            db,
                            "users",
                            auth.currentUser.uid,
                            "months",
                            monthId
                        ),
                        currentData,
                        { merge: true }
                    );

                    alert("Import Success!");

                    renderSheet();
                };

                reader.readAsArrayBuffer(e.target.files[0]);
            };

            fileInput.click();
        };

        // KEEP ALL YOUR OTHER ORIGINAL FUNCTIONS HERE EXACTLY SAME

    </script>
</head>

<body class="bg-slate-50 min-h-screen">

    <div class="p-10 text-center text-slate-500 font-bold">
        Your original UI/body code remains EXACTLY SAME.
        Only Excel import + cleanTime fixed.
    </div>

</body>
</html>
