<!DOCTYPE html>    
<html lang="si">    
<head>    
    <meta charset="UTF-8">    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <title>Advanced OT Tracker | CIC Livestock Solutions</title>    
    <script src="https://cdn.tailwindcss.com"></script>    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
        
    <script type="module">    
        import { db, auth } from './firebase-config.js';
        import { initAuth, login, signup, logout } from './auth.js';
        import { calculateRow, cleanTime } from './calculator.js';
        import { generatePDF } from './report.js'; 
        import { doc, setDoc, getDoc, collection, query, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let userHolidays = [];
        let userLeaves = {};
        let currentCalcData = {};
        let currentMonthRows = [];

        initAuth(
            async (user) => {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('appScreen').classList.remove('hidden');
                document.getElementById('userName').innerText = user.displayName || user.email.split('@')[0].toUpperCase();
                await loadInitialData();
            },
            () => {
                document.getElementById('authScreen').classList.remove('hidden');
                document.getElementById('appScreen').classList.add('hidden');
            }
        );

        async function loadInitialData() {
            await loadHolidays();
            await loadLeaves();
            renderSheet();
        }

        async function loadHolidays() {    
            const q = query(collection(db, "users", auth.currentUser.uid, "holidays"));    
            const snap = await getDocs(q);    
            userHolidays = snap.docs.map(doc => doc.id);    
            renderHolidayList();
        }

        async function loadLeaves() {
            const user = auth.currentUser;
            const monthId = `${document.getElementById('yearSelect').value}-${parseInt(document.getElementById('monthSelect').value) + 1}`;
            const docSnap = await getDoc(doc(db, "users", user.uid, "leaves", monthId));
            userLeaves = docSnap.exists() ? docSnap.data() : {};
            renderLeaveList();
        }

        window.updateCell = async (day, field, value) => {
            const user = auth.currentUser;
            const monthId = `${document.getElementById('yearSelect').value}-${parseInt(document.getElementById('monthSelect').value) + 1}`;
            const docRef = doc(db, "users", user.uid, "months", monthId);
            const docSnap = await getDoc(docRef);
            let data = docSnap.exists() ? docSnap.data() : {};
            if(!data[day]) data[day] = { in: "00:00", out: "00:00", isNextDay: false };
            data[day][field] = value;
            await setDoc(docRef, data, { merge: true });
            renderSheet();
        };

        async function renderSheet() {    
            if(!auth.currentUser) return;
            const month = parseInt(document.getElementById('monthSelect').value);    
            const year = parseInt(document.getElementById('yearSelect').value);    
            const container = document.getElementById('sheetContainer');    
            const daysInMonth = new Date(year, month + 1, 0).getDate();    
            const monthId = `${year}-${month + 1}`;    
            
            container.innerHTML = "<div class='p-10 text-center text-slate-400 text-[10px] font-bold uppercase tracking-widest'>Syncing Data...</div>";    
            const docSnap = await getDoc(doc(db, "users", auth.currentUser.uid, "months", monthId));    
            const savedData = docSnap.exists() ? docSnap.data() : {};    

            container.innerHTML = "";    
            currentMonthRows = [];
            let tNormalHrs = 0, tSpecialOT = 0, tLieuDays = 0, deductionDays = 0;
            let lastDayWasFullShift = false;
            let wC = 0, hC = 0, fLC = 0, hDC = 0;
    
            for (let d = 1; d <= daysInMonth; d++) {    
                const dateObj = new Date(year, month, d);
                const dayOfWeek = dateObj.getDay();
                const isoDate = dateObj.toLocaleDateString('en-CA');
                const isHoliday = userHolidays.includes(isoDate);    
                const dayData = savedData[String(d)] || { in: "00:00", out: "00:00", isNextDay: false };    
                const leaveData = userLeaves[d];

                const res = calculateRow(dayData.in, dayData.out, isHoliday, dayOfWeek, dayData.isNextDay, lastDayWasFullShift, leaveData, (d === daysInMonth));
                if ((dayOfWeek === 0 || isHoliday) && res.worked >= 9) tLieuDays++;
                lastDayWasFullShift = res.isFullDay;

                if (dayOfWeek === 0 || isHoliday) tSpecialOT += res.worked;
                else tNormalHrs += res.worked;

                if (dayOfWeek === 0 || dayOfWeek === 6 || isHoliday) {
                    deductionDays += 1;
                    if(dayOfWeek === 0 || dayOfWeek === 6) wC++; else hC++;
                } else if (leaveData) {
                    if (leaveData.type === "Full Leave" || leaveData.type === "Lieu Leave") { deductionDays += 1; fLC++; }
                    else if (leaveData.type === "Half Day") { deductionDays += 0.5; hDC++; }
                }

                if (res.worked > 0 || leaveData) {
                    currentMonthRows.push({ 
                        date: `${year}/${String(month + 1).padStart(2,'0')}/${String(d).padStart(2,'0')}`, 
                        in: (dayData.in !== "00:00" && dayData.in !== "") ? dayData.in : "-", 
                        out: (dayData.out !== "00:00" && dayData.out !== "") ? dayData.out : "-", 
                        worked: res.worked, ot: res.ot, sOT: res.sOT, type: leaveData ? leaveData.type : '' 
                    });
                }
    
                const row = document.createElement('div');    
                row.className = `flex items-center gap-0.5 p-2 border-b ${isHoliday ? 'bg-red-50' : (dayOfWeek === 0 ? 'bg-orange-50' : 'bg-white')}`;    
                row.innerHTML = `    
                    <div class="w-7 text-center flex-shrink-0">    
                        <span class="block text-[6px] font-bold text-slate-400 uppercase">${dateObj.toLocaleDateString('en-US', { weekday: 'short' })}</span>    
                        <span class="text-sm font-black text-slate-700 leading-none">${d}</span>    
                    </div>    
                    <div class="flex-1 grid grid-cols-2 gap-1 min-w-[80px]">    
                        <div class="flex flex-col gap-1">
                            <input type="time" value="${dayData.in === '00:00' ? '' : dayData.in}" onchange="updateCell('${d}', 'in', this.value)" class="p-0.5 rounded border text-[9px] bg-white w-full text-center outline-none">
                            <span class="text-[5px] text-slate-400 text-center uppercase font-bold tracking-tighter">In Time</span>
                        </div>
                        <div class="flex flex-col gap-1">
                            <input type="time" value="${dayData.out === '00:00' ? '' : dayData.out}" onchange="updateCell('${d}', 'out', this.value)" class="p-0.5 rounded border text-[9px] bg-white w-full text-center outline-none">
                            <label class="flex items-center justify-center gap-0.5 cursor-pointer">
                                <input type="checkbox" ${dayData.isNextDay ? 'checked' : ''} onchange="updateCell('${d}', 'isNextDay', this.checked)" class="w-2 h-2">
                                <span class="text-[5px] text-red-500 uppercase font-black">Next Day</span>
                            </label>
                        </div>
                    </div>
                    <div class="w-16 text-center text-[7px] font-bold border-x px-0.5 leading-tight flex-shrink-0">
                        <p class="text-blue-600 truncate uppercase mb-0.5">${leaveData ? leaveData.type.split(' ')[0] : '-'}</p>
                        <div class="flex justify-between text-[6px]"><span class="text-slate-400">W:${res.worked > 0 ? res.worked : '-'}</span><span class="text-red-500">R:${res.req}</span></div>
                    </div>    
                    <div class="w-10 text-right flex-shrink-0">    
                        <div class="text-[8px] font-black text-blue-600">${res.ot > 0 ? res.ot : ''}</div>
                        <div class="text-[8px] font-black text-red-600">${res.sOT > 0 ? res.sOT : ''}</div>
                    </div>    
                `;    
                container.appendChild(row);    
            }    

            const tShouldWork = (daysInMonth - deductionDays) * 9;
            const tNormalOT = Math.max(0, tNormalHrs - tShouldWork);
            currentCalcData = { year, monthName: document.getElementById('monthSelect').options[month].text, daysInMonth, deductionDays, weekendCount: wC, holidayCount: hC, fullLeaveCount: fLC, halfDayCount: hDC, tShouldWork, tNormalOT, tSpecialOT, tLieuDays, workingDays: (daysInMonth - deductionDays) };

            document.getElementById('totalHrs').innerHTML = `
                <div class="grid grid-cols-1 gap-1 text-[9px] leading-tight mb-2">
                    <div class="flex justify-between"><span>Normal Worked:</span> <span class="font-bold">${tNormalHrs.toFixed(1)}</span></div>
                    <div class="flex justify-between"><span>Should Work:</span> <span class="font-bold">${tShouldWork.toFixed(1)}</span></div>
                    <div class="flex justify-between text-yellow-300"><span>Normal OT:</span> <span class="font-bold">${tNormalOT.toFixed(1)}</span></div>
                    <div class="flex justify-between text-orange-300"><span>Special OT:</span> <span class="font-bold">${tSpecialOT.toFixed(1)}</span></div>
                    <div class="flex justify-between text-blue-300 border-t border-white/20 pt-1 mt-1"><span>Lieu Days:</span> <span class="font-bold">${tLieuDays}</span></div>
                </div>
                <div class="flex gap-2">
                    <button onclick="showCalculationInfo()" class="flex-1 bg-white/20 py-2 rounded-xl text-[8px] font-black uppercase">Logic</button>
                    <button onclick="askUserDetails()" class="flex-1 bg-green-500 py-2 rounded-xl text-[8px] font-black uppercase">Report</button>
                </div>
            `;    
        }

        window.askUserDetails = () => {
            const modal = `<div id="userModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-6"><div class="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl animate-in fade-in zoom-in duration-200"><h3 class="text-blue-600 font-black text-lg mb-6 uppercase tracking-tight">Report Details</h3><input type="text" id="pdfFullName" placeholder="Full Employee Name" class="w-full p-4 bg-slate-50 border rounded-2xl mb-3 text-sm outline-none font-bold uppercase"><input type="text" id="pdfEpf" placeholder="EPF Number" class="w-full p-4 bg-slate-50 border rounded-2xl mb-6 text-sm outline-none font-bold uppercase"><button onclick="processPDF()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase text-xs shadow-lg">Generate PDF</button><button onclick="document.getElementById('userModal').remove()" class="w-full mt-3 text-slate-400 font-bold text-[10px] uppercase">Cancel</button></div></div>`;
            document.body.insertAdjacentHTML('beforeend', modal);
        };

        window.processPDF = () => {
            const name = document.getElementById('pdfFullName').value || "..................";
            const epf = document.getElementById('pdfEpf').value || "..................";
            document.getElementById('userModal').remove();
            generatePDF(currentCalcData, currentMonthRows, name, epf);
        };

        window.showCalculationInfo = () => {
            const d = currentCalcData;
            const modal = `<div id="logicModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-6"><div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl animate-in fade-in zoom-in duration-200"><h3 class="text-blue-600 font-black text-lg mb-6 uppercase tracking-tight">Calc Logic</h3><div class="space-y-4 text-xs font-bold text-slate-600"><div class="flex justify-between border-b pb-2"><span>Days in Month</span><span>${d.daysInMonth}</span></div><div class="bg-slate-50 p-4 rounded-2xl space-y-2"><p class="text-[9px] uppercase text-slate-400">Deductions (-)</p><div class="flex justify-between"><span>Sat/Sun</span><span>${d.weekendCount}</span></div><div class="flex justify-between"><span>Holidays</span><span>${d.holidayCount}</span></div><div class="flex justify-between"><span>Leaves</span><span>${d.fullLeaveCount + (d.halfDayCount*0.5)}</span></div><div class="flex justify-between border-t pt-2 text-red-500 font-black"><span>Total Deduction</span><span>${d.deductionDays}</span></div></div><div class="p-4 bg-blue-50 rounded-2xl border border-blue-100"><div class="text-base text-blue-600 font-black">(${d.daysInMonth} - ${d.deductionDays}) x 9 = ${d.tShouldWork.toFixed(1)}</div></div></div><button onclick="document.getElementById('logicModal').remove()" class="w-full mt-8 bg-slate-900 text-white py-4 rounded-2xl font-black uppercase text-xs">Close</button></div></div>`;
            document.body.insertAdjacentHTML('beforeend', modal);
        };

        window.handleLogin = () => login(document.getElementById('email').value, document.getElementById('pass').value).catch(e => alert(e.message));
        window.handleSignup = () => signup(document.getElementById('email').value, document.getElementById('pass').value).then(() => alert("Account Created!")).catch(e => alert(e.message));
        window.logout = logout;
        window.renderSheet = renderSheet;
        window.loadInitialData = loadInitialData;
        window.switchTab = (tab) => {
            ['sheetView', 'holidayView', 'leaveView'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(tab + 'View').classList.remove('hidden');
            if(tab === 'sheet') loadInitialData();
        };

        window.importExcel = () => {
            const f = document.createElement('input'); f.type = 'file'; f.accept = '.xlsx, .xls';
            f.onchange = (e) => {
                const r = new FileReader();
                r.onload = async (ev) => {
                    const wb = XLSX.read(new Uint8Array(ev.target.result), { type: 'array', cellDates: true });
                    const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { range: 11, defval: "", raw: false });
                    const mId = `${document.getElementById('yearSelect').value}-${parseInt(document.getElementById('monthSelect').value) + 1}`;
                    let data = {};
                    json.forEach(row => {
                        let dK = Object.keys(row).find(k => k.trim().toLowerCase() === "date");
                        let iK = Object.keys(row).find(k => k.trim().toLowerCase() === "check in");
                        let oK = Object.keys(row).find(k => k.trim().toLowerCase() === "check out");
                        let odK = Object.keys(row).find(k => k.trim().toLowerCase() === "out date");
                        if(row[dK]) {
                            let ds = String(row[dK]).trim(), p = ds.split(/[-/ ]/), day = p.length >= 3 ? (p[0].length === 4 ? parseInt(p[2]) : parseInt(p[0])) : parseInt(ds);
                            if(day) data[String(day)] = { in: cleanTime(row[iK]), out: cleanTime(row[oK]), isNextDay: (row[odK] && String(row[odK]).trim() !== ds) };
                        }
                    });
                    await setDoc(doc(db, "users", auth.currentUser.uid, "months", mId), data, { merge: true });
                    alert("Import Success!"); loadInitialData();
                };
                r.readAsArrayBuffer(e.target.files[0]);
            }; f.click();
        };

        window.addHoliday = async () => { const d = document.getElementById('holidayInput').value; if (!d) return; await setDoc(doc(db, "users", auth.currentUser.uid, "holidays", d), { active: true }); await loadInitialData(); };
        window.removeHoliday = async (d) => { await deleteDoc(doc(db, "users", auth.currentUser.uid, "holidays", d)); await loadInitialData(); };
        function renderHolidayList() { document.getElementById('holidayList').innerHTML = userHolidays.map(d => `<div class="flex justify-between items-center p-3 bg-white rounded-xl mb-2 border border-slate-100 shadow-sm"><span class="font-bold text-slate-700 text-xs">${d}</span><button onclick="removeHoliday('${d}')" class="text-red-500 text-[10px] font-black uppercase">Remove</button></div>`).join('') || `<p class="text-slate-400 text-[10px] text-center py-4">No Holidays Added</p>`; }
        window.saveLeave = async () => { const dt = document.getElementById('leaveDate').value; const ty = document.getElementById('leaveType').value; const sl = document.getElementById('leaveSlot').value; if(!dt) return alert("Select Date"); const dObj = new Date(dt); const day = dObj.getDate(); const mId = `${dObj.getFullYear()}-${dObj.getMonth() + 1}`; userLeaves[day] = { type: ty, slot: sl }; await setDoc(doc(db, "users", auth.currentUser.uid, "leaves", mId), userLeaves, { merge: true }); alert("Leave Saved!"); await loadInitialData(); };
        window.deleteLeave = async (day) => { delete userLeaves[day]; const mId = `${document.getElementById('yearSelect').value}-${parseInt(document.getElementById('monthSelect').value) + 1}`; await setDoc(doc(db, "users", auth.currentUser.uid, "leaves", mId), userLeaves); await loadInitialData(); };
        function renderLeaveList() { document.getElementById('leaveList').innerHTML = Object.entries(userLeaves).map(([day, data]) => `<div class="flex justify-between items-center p-3 bg-white rounded-xl mb-2 border border-slate-100"><div class="text-[10px] font-bold text-slate-600">Day ${day} - ${data.type}</div><button onclick="deleteLeave('${day}')" class="text-red-500 text-[10px] font-black uppercase">Delete</button></div>`).join('') || `<p class="text-slate-400 text-[10px] text-center py-4">No leaves recorded.</p>`; }
        window.clearMonthData = async () => { if(!confirm("Are you sure?")) return; const mId = `${document.getElementById('yearSelect').value}-${parseInt(document.getElementById('monthSelect').value) + 1}`; await deleteDoc(doc(db, "users", auth.currentUser.uid, "months", mId)); loadInitialData(); };
    </script>    
</head>    
<body class="bg-slate-50 min-h-screen text-slate-900 pb-12">    
    <!-- Auth Screen -->
    <div id="authScreen" class="max-w-md mx-auto pt-24 px-6 text-center">    
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl border">    
            <h1 class="text-2xl font-black mb-8 text-blue-600 uppercase tracking-tight">Cloud Sync</h1>    
            <input type="email" id="email" placeholder="Email" class="w-full p-4 mb-3 bg-slate-50 rounded-2xl border outline-none text-sm">    
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 mb-8 bg-slate-50 rounded-2xl border outline-none text-sm">    
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl mb-4 uppercase">Login</button>
            <button onclick="handleSignup()" class="w-full bg-slate-100 text-slate-600 font-bold py-4 rounded-2xl text-[10px] uppercase border tracking-widest">Create Account</button>
        </div>    
    </div>    

    <!-- App Screen -->
    <div id="appScreen" class="hidden max-w-lg mx-auto">
        <div class="p-3 flex justify-between items-center bg-white border-b sticky top-0 z-30 shadow-sm">
            <div class="flex items-center gap-1.5">
                <div class="w-7 h-7 bg-blue-600 rounded-full flex items-center justify-center text-white font-black text-[10px]">U</div>
                <span id="userName" class="text-[9px] font-black text-slate-700 uppercase tracking-tighter">User</span>
            </div>
            <button onclick="logout()" class="bg-red-50 text-red-500 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase border border-red-100">Logout</button>
        </div>

        <div class="bg-white flex text-center border-b sticky top-[53px] z-20 shadow-sm">
            <button onclick="switchTab('sheet')" class="flex-1 py-3 font-black text-[9px] uppercase text-slate-500">Sheet</button>
            <button onclick="switchTab('leave')" class="flex-1 py-3 font-black text-[9px] uppercase text-slate-500">Leaves</button>
            <button onclick="switchTab('holiday')" class="flex-1 py-3 font-black text-[9px] uppercase text-slate-500">Holidays</button>
        </div>

        <div id="sheetView" class="p-3">
            <div class="bg-blue-600 p-5 rounded-[2rem] text-white shadow-xl mb-4">
                <div id="totalHrs" class="mb-3 font-black">Syncing...</div>
                <div class="flex gap-2 mb-3">
                    <select id="yearSelect" onchange="loadInitialData();" class="bg-slate-700 p-2 rounded-xl text-[9px] flex-1 outline-none border-none text-white font-bold"><option>2026</option></select>
                    <select id="monthSelect" onchange="loadInitialData();" class="bg-slate-700 p-2 rounded-xl text-[9px] flex-1 outline-none border-none text-white font-bold">
                        <option value="0">JANUARY</option><option value="1">FEBRUARY</option><option value="2">MARCH</option>
                        <option value="3" selected>APRIL</option><option value="4">MAY</option><option value="5">JUNE</option>
                        <option value="6">JULY</option><option value="7">AUGUST</option><option value="8">SEPTEMBER</option>
                        <option value="9">OCTOBER</option><option value="10">NOVEMBER</option><option value="11">DECEMBER</option>
                    </select>
                </div>
                <div class="flex gap-2">
                    <button onclick="importExcel()" class="flex-1 bg-white text-blue-600 text-[9px] py-2.5 rounded-xl font-black uppercase tracking-wider">Import</button>
                    <button onclick="clearMonthData()" class="flex-1 bg-red-500 text-white text-[9px] py-2.5 rounded-xl font-black uppercase tracking-wider">Clear</button>
                </div>
            </div>
            <div id="sheetContainer" class="bg-white rounded-[1.5rem] border overflow-hidden shadow-sm min-h-[200px]"></div>
        </div>

        <div id="leaveView" class="hidden p-4">
            <div class="bg-white p-5 rounded-[2rem] border shadow-sm mb-4">
                <h3 class="font-black text-xs uppercase mb-3 text-slate-400">Record Leave</h3>
                <input type="date" id="leaveDate" class="w-full p-2.5 bg-slate-50 border rounded-xl mb-2.5 text-sm outline-none">
                <select id="leaveType" class="w-full p-2.5 bg-slate-50 border rounded-xl mb-2.5 text-sm outline-none"><option>Full Leave</option><option>Half Day</option><option>Short Leave</option><option>Lieu Leave</option></select>
                <select id="leaveSlot" class="w-full p-2.5 bg-slate-50 border rounded-xl mb-3.5 text-sm outline-none"><option>Full Day</option><option>Morning</option><option>Evening</option></select>
                <button onclick="saveLeave()" class="w-full bg-blue-600 text-white font-black py-3 rounded-xl shadow-lg uppercase">Save Leave</button>
            </div>
            <div id="leaveList"></div>
        </div>

        <div id="holidayView" class="hidden p-4">
            <div class="bg-white p-5 rounded-[2rem] border shadow-sm mb-4">
                <h3 class="font-black text-xs uppercase mb-3 text-slate-400">Add Holiday</h3>
                <input type="date" id="holidayInput" class="w-full p-3 bg-slate-50 border rounded-xl mb-3.5 outline-none">
                <button onclick="addHoliday()" class="w-full bg-blue-600 text-white font-black py-3 rounded-xl shadow-lg uppercase">Add to List</button>
            </div>
            <div id="holidayList"></div>
        </div>
    </div>
</body>
</html>
