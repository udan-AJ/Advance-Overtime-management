<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | CIC Livestock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { db, auth } from './firebase-config.js';
        import { initAuth, logout } from './auth.js';
        import { calculateRow } from './calculator.js';
        import { collection, query, getDocs, doc, getDoc, setDoc, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let allUsers = [];

        // Auth Check for Admin
        initAuth(async (user) => {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists() && userDoc.data().isAdmin) {
                document.getElementById('adminContent').classList.remove('hidden');
                loadDashboard();
            } else {
                alert("Access Denied! Admins only.");
                logout();
            }
        }, () => { window.location.href = "index.html"; });

        async function loadDashboard() {
            await fetchUsers();
            await loadSummary();
            await loadLogs();
        }

        async function fetchUsers() {
            const snap = await getDocs(collection(db, "users"));
            allUsers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderUsers();
        }

        function renderUsers() {
            const list = document.getElementById('userList');
            list.innerHTML = allUsers.map(u => `
                <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl mb-2 border">
                    <div>
                        <p class="font-black text-sm uppercase text-slate-700">${u.email}</p>
                        <p class="text-[10px] text-slate-400">UID: ${u.id}</p>
                    </div>
                    <button onclick="viewUserTimesheet('${u.id}')" class="bg-blue-600 text-white text-[10px] px-4 py-2 rounded-xl font-bold uppercase">View</button>
                </div>
            `).join('');
        }

        // Summary Calculation for All Users
        async function loadSummary() {
            const month = document.getElementById('monthFilter').value;
            const year = document.getElementById('yearFilter').value;
            const monthId = `${year}-${parseInt(month) + 1}`;
            const container = document.getElementById('summaryTable');
            container.innerHTML = "Calculating...";

            let html = `
                <table class="w-full text-left text-[11px] border-collapse">
                    <thead>
                        <tr class="text-slate-400 uppercase border-b font-black">
                            <th class="py-3">User</th>
                            <th>Normal OT</th>
                            <th>Special OT</th>
                            <th>Lieu</th>
                        </tr>
                    </thead>
                    <tbody class="font-bold">
            `;

            for (const u of allUsers) {
                const monthSnap = await getDoc(doc(db, "users", u.id, "months", monthId));
                const leaveSnap = await getDoc(doc(db, "users", u.id, "leaves", monthId));
                const holidaySnap = await getDocs(collection(db, "users", u.id, "holidays"));
                
                const savedData = monthSnap.exists() ? monthSnap.data() : {};
                const userLeaves = leaveSnap.exists() ? leaveSnap.data() : {};
                const userHolidays = holidaySnap.docs.map(d => d.id);
                
                let tNOT = 0, tSOT = 0, tLieu = 0, tWorked = 0, deductions = 0;
                const daysInMonth = new Date(year, parseInt(month) + 1, 0).getDate();
                let lastFull = false;

                for (let d = 1; d <= daysInMonth; d++) {
                    const dateObj = new Date(year, month, d);
                    const dayOfWeek = dateObj.getDay();
                    const dayData = savedData[d] || { in: "00:00", out: "00:00", isNextDay: false };
                    const isHoliday = userHolidays.includes(dateObj.toLocaleDateString('en-CA'));
                    const leave = userLeaves[d];

                    const res = calculateRow(dayData.in, dayData.out, isHoliday, dayOfWeek, dayData.isNextDay, lastFull, leave, d === daysInMonth);
                    
                    if ((dayOfWeek === 0 || isHoliday) && res.worked >= 9) tLieu++;
                    if (dayOfWeek === 0 || isHoliday) tSOT += res.worked; else tWorked += res.worked;

                    // Deduction Logic
                    if (dayOfWeek === 0 || dayOfWeek === 6 || isHoliday) deductions += 1;
                    else if (leave) {
                        if (leave.type === "Full Leave" || leave.type === "Lieu Leave") deductions += 1;
                        else if (leave.type === "Half Day") deductions += 0.5;
                    }
                    lastFull = res.isFullDay;
                }

                const shouldWork = (daysInMonth - deductions) * 9;
                tNOT = Math.max(0, tWorked - shouldWork);

                html += `
                    <tr class="border-b">
                        <td class="py-4 text-blue-600">${u.email.split('@')[0].toUpperCase()}</td>
                        <td>${tNOT.toFixed(1)}</td>
                        <td>${tSOT.toFixed(1)}</td>
                        <td class="text-orange-500">${tLieu}</td>
                    </tr>
                `;
            }
            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        async function loadLogs() {
            const q = query(collection(db, "logs"), orderBy("time", "desc"), limit(10));
            const snap = await getDocs(q);
            document.getElementById('logList').innerHTML = snap.docs.map(d => {
                const data = d.data();
                return `<div class="text-[10px] p-2 border-b flex justify-between">
                    <span class="font-bold uppercase">${data.user}</span>
                    <span class="text-slate-400">${new Date(data.time).toLocaleString()}</span>
                </div>`;
            }).join('');
        }

        window.loadSummary = loadSummary;
        window.logout = logout;
    </script>
</head>
<body class="bg-slate-100 min-h-screen">
    <div id="adminContent" class="hidden max-w-4xl mx-auto p-6">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-xl font-black uppercase text-slate-800 tracking-tighter">Admin <span class="text-blue-600">Portal</span></h1>
            <button onclick="logout()" class="bg-white text-red-500 px-6 py-2 rounded-2xl text-[10px] font-black uppercase shadow-sm border">Exit</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Left: User Management -->
            <div class="md:col-span-1">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border mb-6">
                    <h2 class="text-xs font-black uppercase text-slate-400 mb-4">Users</h2>
                    <div id="userList"></div>
                </div>
                <div class="bg-slate-800 p-6 rounded-[2.5rem] text-white shadow-lg">
                    <h2 class="text-xs font-black uppercase text-slate-400 mb-4">Recent Access</h2>
                    <div id="logList"></div>
                </div>
            </div>

            <!-- Right: Summary Dashboard -->
            <div class="md:col-span-2">
                <div class="bg-white p-8 rounded-[3rem] shadow-sm border min-h-[500px]">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-lg font-black uppercase tracking-tight">Monthly Summary</h2>
                        <div class="flex gap-2">
                            <select id="yearFilter" onchange="loadSummary()" class="bg-slate-50 border p-2 rounded-xl text-[10px] font-bold outline-none">
                                <option>2026</option>
                            </select>
                            <select id="monthFilter" onchange="loadSummary()" class="bg-slate-50 border p-2 rounded-xl text-[10px] font-bold outline-none">
                                <option value="3">APRIL</option>
                                <option value="4">MAY</option>
                            </select>
                        </div>
                    </div>
                    <div id="summaryTable" class="overflow-x-auto"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
