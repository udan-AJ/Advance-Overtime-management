<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | CIC Livestock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { db, auth } from './firebase-config.js';
        import { initAuth, logout } from './auth.js';
        import { calculateRow } from './calculator.js';
        import { collection, query, getDocs, doc, getDoc, setDoc, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let allUsers = [];
        let selectedUserId = null;

        initAuth(async (user) => {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists() && userDoc.data().isAdmin) {
                document.getElementById('adminContent').classList.remove('hidden');
                loadDashboard();
            } else {
                alert("Access Denied! Admins only.");
                logout();
            }
        }, () => { window.location.href = "index.html"; });

        async function loadDashboard() {
            await fetchUsers();
            await loadSummary();
            await loadLogs();
        }

        async function fetchUsers() {
            const snap = await getDocs(collection(db, "users"));
            allUsers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            const list = document.getElementById('userList');
            list.innerHTML = allUsers.map(u => `
                <div onclick="viewUserSheet('${u.id}')" class="flex justify-between items-center p-3 bg-slate-50 rounded-xl mb-2 border text-[10px] cursor-pointer hover:bg-blue-50 transition-colors">
                    <span class="font-bold truncate w-32 uppercase">${u.email.split('@')[0]}</span>
                    <span class="${u.isAdmin ? 'text-green-600' : 'text-slate-400'} font-black italic">${u.isAdmin ? 'ADMIN' : 'USER'}</span>
                </div>
            `).join('');
        }

        window.viewUserSheet = async (uid) => {
            selectedUserId = uid;
            const user = allUsers.find(u => u.id === uid);
            document.getElementById('selectedUserName').innerText = `Editing: ${user.email.split('@')[0].toUpperCase()}`;
            loadSummary();
        };

        window.updateUserCell = async (day, field, value) => {
            if (!selectedUserId) return;
            const month = document.getElementById('monthFilter').value;
            const year = document.getElementById('yearFilter').value;
            const monthId = `${year}-${parseInt(month) + 1}`;
            
            const docRef = doc(db, "users", selectedUserId, "months", monthId);
            const docSnap = await getDoc(docRef);
            let data = docSnap.exists() ? docSnap.data() : {};
            if(!data[day]) data[day] = { in: "00:00", out: "00:00", isNextDay: false };
            
            if (field === 'isNextDay') data[day][field] = value === 'true';
            else data[day][field] = value;

            await setDoc(docRef, data, { merge: true });
            loadSummary();
        };

        async function loadSummary() {
            const month = document.getElementById('monthFilter').value;
            const year = document.getElementById('yearFilter').value;
            const monthId = `${year}-${parseInt(month) + 1}`;
            const container = document.getElementById('summaryTable');
            container.innerHTML = "<p class='text-center p-10 font-bold animate-pulse'>Crunching Numbers...</p>";

            let html = `<table class="w-full text-[10px]"><thead class="border-b text-slate-400 uppercase font-black"><tr class="text-left"><th class="pb-2">User / Details</th><th>N-OT</th><th>S-OT</th><th>Lieu</th></tr></thead><tbody>`;

            for (const u of allUsers) {
                const isSelected = selectedUserId === u.id;
                const monthSnap = await getDoc(doc(db, "users", u.id, "months", monthId));
                const leaveSnap = await getDoc(doc(db, "users", u.id, "leaves", monthId));
                const holidaySnap = await getDocs(collection(db, "users", u.id, "holidays"));
                
                const savedData = monthSnap.exists() ? monthSnap.data() : {};
                const userLeaves = leaveSnap.exists() ? leaveSnap.data() : {};
                const userHolidays = holidaySnap.docs.map(d => d.id);
                
                let tNOT = 0, tSOT = 0, tLieu = 0, tWorked = 0, deductions = 0;
                const daysInMonth = new Date(year, parseInt(month) + 1, 0).getDate();
                let lastFull = false;

                let userRowsHtml = "";

                for (let d = 1; d <= daysInMonth; d++) {
                    const dateObj = new Date(year, month, d);
                    const dayData = savedData[d] || { in: "00:00", out: "00:00", isNextDay: false };
                    const res = calculateRow(dayData.in, dayData.out, userHolidays.includes(dateObj.toLocaleDateString('en-CA')), dateObj.getDay(), dayData.isNextDay, lastFull, userLeaves[d], d === daysInMonth);
                    
                    if ((dateObj.getDay() === 0 || userHolidays.includes(dateObj.toLocaleDateString('en-CA'))) && res.worked >= 9) tLieu++;
                    if (dateObj.getDay() === 0 || userHolidays.includes(dateObj.toLocaleDateString('en-CA'))) tSOT += res.worked; else tWorked += res.worked;

                    if (dateObj.getDay() === 0 || dateObj.getDay() === 6 || userHolidays.includes(dateObj.toLocaleDateString('en-CA'))) deductions += 1;
                    else if (userLeaves[d]) {
                        if (userLeaves[d].type === "Full Leave" || userLeaves[d].type === "Lieu Leave") deductions += 1;
                        else if (userLeaves[d].type === "Half Day") deductions += 0.5;
                    }
                    lastFull = res.isFullDay;

                    if (isSelected) {
                        userRowsHtml += `
                            <tr class="bg-blue-50/50 border-b text-[9px]">
                                <td class="py-1 pl-4">Day ${d}</td>
                                <td colspan="3" class="py-1">
                                    <div class="flex gap-2">
                                        <input type="time" value="${dayData.in}" onchange="updateUserCell('${d}', 'in', this.value)" class="border rounded p-0.5">
                                        <input type="time" value="${dayData.out}" onchange="updateUserCell('${d}', 'out', this.value)" class="border rounded p-0.5">
                                        <label class="flex items-center gap-1"><input type="checkbox" ${dayData.isNextDay ? 'checked' : ''} onchange="updateUserCell('${d}', 'isNextDay', this.checked.toString())"> <span class="text-[8px]">NextDay</span></label>
                                    </div>
                                </td>
                            </tr>`;
                    }
                }
                const sWork = (daysInMonth - deductions) * 9;
                html += `
                    <tr class="border-b font-bold ${isSelected ? 'bg-blue-100' : ''}">
                        <td onclick="viewUserSheet('${u.id}')" class="py-3 text-blue-600 truncate cursor-pointer">${u.email.split('@')[0].toUpperCase()}</td>
                        <td>${Math.max(0, tWorked - sWork).toFixed(1)}</td>
                        <td>${tSOT.toFixed(1)}</td>
                        <td class="text-orange-500">${tLieu}</td>
                    </tr>
                    ${isSelected ? userRowsHtml : ''}
                `;
            }
            container.innerHTML = html + `</tbody></table>`;
        }

        async function loadLogs() {
            const q = query(collection(db, "logs"), orderBy("time", "desc"), limit(8));
            const snap = await getDocs(q);
            document.getElementById('logList').innerHTML = snap.docs.map(d => `<div class="text-[9px] py-1 border-b flex justify-between uppercase font-bold text-slate-500"><span>${d.data().user.split('@')[0]}</span><span>${new Date(d.data().time).toLocaleTimeString()}</span></div>`).join('');
        }

        window.loadSummary = loadSummary;
        window.logout = logout;
    </script>
</head>
<body class="bg-slate-100 min-h-screen font-sans">
    <div id="adminContent" class="hidden max-w-4xl mx-auto p-4 md:p-8">
        <div class="flex justify-between items-center mb-8 bg-white p-4 rounded-3xl border shadow-sm">
            <div>
                <h1 class="text-lg font-black uppercase text-slate-800">Admin <span class="text-blue-600">Dashboard</span></h1>
                <p id="selectedUserName" class="text-[9px] font-bold text-blue-500 uppercase"></p>
            </div>
            <button onclick="logout()" class="bg-red-50 text-red-500 px-5 py-2 rounded-2xl text-[10px] font-black uppercase border border-red-100">Sign Out</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-[2rem] border shadow-sm">
                    <h2 class="text-[10px] font-black uppercase text-slate-400 mb-4">Users List (Click to Edit)</h2>
                    <div id="userList"></div>
                </div>
                <div class="bg-slate-900 p-6 rounded-[2rem] text-white shadow-xl">
                    <h2 class="text-[10px] font-black uppercase text-slate-500 mb-4 tracking-widest">Login History</h2>
                    <div id="logList"></div>
                </div>
            </div>

            <div class="md:col-span-2">
                <div class="bg-white p-6 md:p-10 rounded-[3rem] border shadow-sm min-h-[500px]">
                    <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-8">
                        <h2 class="font-black uppercase text-sm">Monthly Summary Report</h2>
                        <div class="flex gap-2 w-full sm:w-auto">
                            <select id="yearFilter" onchange="loadSummary()" class="bg-slate-50 border p-2 rounded-xl text-[10px] font-bold flex-1"><option>2026</option></select>
                            <select id="monthFilter" onchange="loadSummary()" class="bg-slate-50 border p-2 rounded-xl text-[10px] font-bold flex-1">
                                <option value="0">JANUARY</option><option value="1">FEBRUARY</option><option value="2">MARCH</option>
                                <option value="3" selected>APRIL</option><option value="4">MAY</option>
                            </select>
                        </div>
                    </div>
                    <div id="summaryTable" class="overflow-x-auto"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
